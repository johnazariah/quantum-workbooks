site_name: John Azariah · Quantum
site_description: Making quantum leaps in understanding
site_author: John Azariah
site_url: https://johnazariah.github.io/quantum

repo_name: johnazariah/quantum
repo_url: https://github.com/johnazariah/quantum
docs_dir: docs

theme:
  name: material
  logo: assets/logo.svg
  favicon: assets/favicon.png
  palette:
    - scheme: default
      primary: teal
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - content.code.copy
    - content.code.annotate
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.tabs
    - navigation.footer
    - search.suggest
    - search.highlight
    - toc.follow
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - blog:
      blog_dir: blog
      post_date_format: long
      draft_if_future_date: true

nav:
  - Home: index.md
  - Circuit Bench:
    - Overview: circuit-bench/index.md
    - Getting Started: getting-started.md
    - Learning Path: learning-path.md
    - Foundations:
      - "00 — Reading a Quantum Circuit": circuit-bench/00-reading-a-quantum-circuit/README.md
      - "01 — Bell State": circuit-bench/01-bell-state/README.md
      - "02 — Teleportation": circuit-bench/02-teleportation/README.md
      - "03 — Deutsch-Jozsa": circuit-bench/03-deutsch-jozsa/README.md
    - Algorithms and Applications:
      - "04 — Bernstein-Vazirani": circuit-bench/04-bernstein-vazirani/README.md
      - "05 — Simon's Problem": circuit-bench/05-simons-problem/README.md
      - "06 — Grover's Search": circuit-bench/06-grovers-search/README.md
      - "07 — QAOA for MaxCut": circuit-bench/07-qaoa-maxcut/README.md
      - "08 — VQE for H₂": circuit-bench/08-vqe-h2/README.md
      - "09 — Quantum Fourier Transform": circuit-bench/09-quantum-fourier-transform/README.md
    - Advanced Techniques:
      - "10 — Quantum Phase Estimation": circuit-bench/10-quantum-phase-estimation/README.md
      - "11 — Error Mitigation (ZNE)": circuit-bench/11-error-mitigation-zne/README.md
      - "12 — Quantum Counting": circuit-bench/12-quantum-counting/README.md
  - The Quantum Bottleneck:
    - Companion Notebooks: bottleneck/index.md
  - References: references.md
  - About: about.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true
  - attr_list
  - md_in_html
  - def_list
  - footnotes
  - tables

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/johnazariah/quantum

copyright: Copyright &copy; 2026 John Azariah
