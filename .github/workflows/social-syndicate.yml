name: Social Syndication

on:
  workflow_run:
    workflows: ["Deploy to GitHub Pages"]
    types: [completed]
    branches: [main]
  workflow_dispatch: # manual trigger for testing

jobs:
  linkedin:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install pyyaml -q

      - name: Find and syndicate today's posts
        env:
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_URN: ${{ secrets.LINKEDIN_PERSON_URN }}
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
        run: |
          python3 << 'SCRIPT'
          import yaml, json, os, urllib.request, re, sys, glob
          from datetime import date, timezone, datetime

          today = datetime.now(timezone.utc).strftime("%Y-%m-%d")
          print(f"Looking for posts dated: {today}")

          token = os.environ.get("LINKEDIN_ACCESS_TOKEN", "")
          person_urn = os.environ.get("LINKEDIN_PERSON_URN", "")

          if not token or not person_urn:
              print("❌ LinkedIn credentials not configured")
              sys.exit(1)

          # Find all posts with today's date in front matter
          posts_to_syndicate = []
          for post_path in sorted(glob.glob("docs/blog/posts/*.md")):
              with open(post_path) as f:
                  content = f.read()
              if not content.startswith("---"):
                  continue
              parts = content.split("---", 2)
              if len(parts) < 3:
                  continue
              try:
                  fm = yaml.safe_load(parts[1])
              except yaml.YAMLError:
                  continue
              post_date = fm.get("date", "")
              if hasattr(post_date, "strftime"):
                  post_date = post_date.strftime("%Y-%m-%d")
              else:
                  post_date = str(post_date)
              if post_date == today:
                  posts_to_syndicate.append((post_path, fm, parts[2]))

          if not posts_to_syndicate:
              print(f"No posts for today ({today})")
              sys.exit(0)

          print(f"Found {len(posts_to_syndicate)} post(s) for today")

          # Load syndication cache
          cache_file = "/tmp/syndicated.txt"
          # Use GitHub Actions cache via environment
          state_file = ".github/.syndicated"
          syndicated = set()
          if os.path.exists(state_file):
              syndicated = set(open(state_file).read().strip().split("\n"))

          for post_path, fm, body in posts_to_syndicate:
              # Get LinkedIn hook
              social = fm.get("social", {}) or {}
              linkedin_hook = social.get("linkedin", "").strip()
              if not linkedin_hook:
                  print(f"⚠️  No social.linkedin in {post_path}, skipping")
                  continue

              # Derive slug from filename
              filename = os.path.basename(post_path).replace(".md", "")
              # Strip date prefix if present (e.g., 2026-07-24-slug -> slug)
              if re.match(r"\d{4}-\d{2}-\d{2}-", filename):
                  slug = filename[11:]
              else:
                  slug = filename

              if slug in syndicated:
                  print(f"⏭️  Already syndicated: {slug}")
                  continue

              # Extract title from first H1
              title_match = re.search(r"^#\s+(.+)$", body, re.MULTILINE)
              title = title_match.group(1).strip() if title_match else slug.replace("-", " ").title()
              title = re.sub(r"[`*_]", "", title)

              # Build URL
              post_date = fm.get("date", "")
              if hasattr(post_date, "strftime"):
                  year = post_date.strftime("%Y")
                  month = post_date.strftime("%m")
                  day = post_date.strftime("%d")
              else:
                  year, month, day = str(post_date).split("-")
              url = f"https://johnazariah.github.io/quantum/blog/{year}/{month}/{day}/{slug}/"

              # Build LinkedIn post payload
              payload = {
                  "author": person_urn,
                  "commentary": linkedin_hook,
                  "visibility": "PUBLIC",
                  "distribution": {
                      "feedDistribution": "MAIN_FEED",
                      "targetEntities": [],
                      "thirdPartyDistributionChannels": []
                  },
                  "content": {
                      "article": {
                          "source": url,
                          "title": title
                      }
                  },
                  "lifecycleState": "PUBLISHED",
                  "isReshareDisabledByAuthor": False
              }

              data = json.dumps(payload).encode()
              req = urllib.request.Request(
                  "https://api.linkedin.com/rest/posts",
                  data=data,
                  headers={
                      "Authorization": f"Bearer {token}",
                      "Content-Type": "application/json",
                      "LinkedIn-Version": "202601",
                      "X-Restli-Protocol-Version": "2.0.0",
                  },
                  method="POST"
              )
              try:
                  resp = urllib.request.urlopen(req)
                  print(f"✅ LinkedIn posted: {title}")
                  print(f"   URL: {url}")
                  syndicated.add(slug)
              except urllib.error.HTTPError as e:
                  err_body = e.read().decode()
                  print(f"❌ LinkedIn failed for {slug}: {e.code}")
                  print(f"   {err_body}")
                  # Don't exit on failure — try remaining posts
                  continue

          # Save syndication state
          os.makedirs(os.path.dirname(state_file), exist_ok=True)
          with open(state_file, "w") as f:
              f.write("\n".join(sorted(s for s in syndicated if s)))

          # --- Bluesky syndication ---
          bsky_handle = os.environ.get("BLUESKY_HANDLE", "")
          bsky_pass = os.environ.get("BLUESKY_APP_PASSWORD", "")
          if bsky_handle and bsky_pass:
              print("\n--- Bluesky ---")
              # Authenticate
              auth_payload = json.dumps({
                  "identifier": bsky_handle,
                  "password": bsky_pass
              }).encode()
              auth_req = urllib.request.Request(
                  "https://bsky.social/xrpc/com.atproto.server.createSession",
                  data=auth_payload,
                  headers={"Content-Type": "application/json"},
                  method="POST"
              )
              try:
                  auth_resp = urllib.request.urlopen(auth_req)
                  auth_data = json.loads(auth_resp.read())
                  bsky_token = auth_data["accessJwt"]
                  bsky_did = auth_data["did"]
              except urllib.error.HTTPError as e:
                  print(f"❌ Bluesky auth failed: {e.code} {e.read().decode()}")
                  sys.exit(0)  # Don't fail the workflow for Bluesky issues

              for post_path, fm, body in posts_to_syndicate:
                  social = fm.get("social", {}) or {}
                  bsky_text = social.get("bluesky", "").strip()
                  if not bsky_text:
                      continue

                  filename = os.path.basename(post_path).replace(".md", "")
                  if re.match(r"\d{4}-\d{2}-\d{2}-", filename):
                      slug = filename[11:]
                  else:
                      slug = filename

                  # Build URL
                  post_date = fm.get("date", "")
                  if hasattr(post_date, "strftime"):
                      year, month, day = post_date.strftime("%Y"), post_date.strftime("%m"), post_date.strftime("%d")
                  else:
                      year, month, day = str(post_date).split("-")
                  url = f"https://johnazariah.github.io/quantum/blog/{year}/{month}/{day}/{slug}/"

                  # Append link to text
                  full_text = f"{bsky_text}\n\n{url}"

                  # Detect URL facet for rich link
                  url_start = len(full_text.encode("utf-8")) - len(url.encode("utf-8"))
                  url_end = len(full_text.encode("utf-8"))

                  # Build Bluesky post record
                  now_iso = datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%S.000Z")
                  record = {
                      "$type": "app.bsky.feed.post",
                      "text": full_text,
                      "createdAt": now_iso,
                      "facets": [{
                          "index": {"byteStart": url_start, "byteEnd": url_end},
                          "features": [{
                              "$type": "app.bsky.richtext.facet#link",
                              "uri": url
                          }]
                      }],
                      "embed": {
                          "$type": "app.bsky.embed.external",
                          "external": {
                              "uri": url,
                              "title": re.sub(r"[`*_]", "", (re.search(r"^#\s+(.+)$", body, re.MULTILINE) or type("",(),{"group":lambda s,n:slug})()).group(1)),
                              "description": bsky_text[:200]
                          }
                      }
                  }

                  bsky_payload = json.dumps({
                      "repo": bsky_did,
                      "collection": "app.bsky.feed.post",
                      "record": record
                  }).encode()
                  bsky_req = urllib.request.Request(
                      "https://bsky.social/xrpc/com.atproto.repo.createRecord",
                      data=bsky_payload,
                      headers={
                          "Content-Type": "application/json",
                          "Authorization": f"Bearer {bsky_token}",
                      },
                      method="POST"
                  )
                  try:
                      bsky_resp = urllib.request.urlopen(bsky_req)
                      print(f"✅ Bluesky posted: {slug}")
                  except urllib.error.HTTPError as e:
                      err_body = e.read().decode()
                      print(f"❌ Bluesky failed for {slug}: {e.code}")
                      print(f"   {err_body}")
          else:
              if not bsky_handle or not bsky_pass:
                  print("\n⚠️  Bluesky credentials not configured, skipping")
          SCRIPT

      - name: Commit syndication state
        run: |
          if [ -f .github/.syndicated ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add .github/.syndicated
            git diff --cached --quiet || git commit -m "chore: update syndication state [skip ci]" && git push
          fi
