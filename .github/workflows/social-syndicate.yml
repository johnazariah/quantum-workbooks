name: Social Syndication

on:
  workflow_run:
    workflows: ["Deploy to GitHub Pages"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      backfill_date:
        description: 'Post date to backfill (YYYY-MM-DD), or "all-past" for all published'
        required: false
        type: string
      platform:
        description: 'Platform to post to'
        required: false
        default: 'both'
        type: choice
        options:
          - both
          - linkedin
          - bluesky

permissions:
  contents: write

jobs:
  syndicate:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ github.token }}

      - name: Install dependencies
        run: pip install pyyaml -q

      - name: Syndicate posts
        env:
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_URN: ${{ secrets.LINKEDIN_PERSON_URN }}
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
          BACKFILL_DATE: ${{ github.event.inputs.backfill_date || '' }}
          PLATFORM: ${{ github.event.inputs.platform || 'both' }}
        run: |
          python3 << 'SCRIPT'
          import yaml, json, os, urllib.request, re, sys, glob
          from datetime import timezone, datetime

          backfill = os.environ.get("BACKFILL_DATE", "").strip()
          platform = os.environ.get("PLATFORM", "both").strip()
          today = datetime.now(timezone.utc).strftime("%Y-%m-%d")

          if backfill == "all-past":
              target_dates = None
              print(f"Backfill mode: all published posts up to {today}")
          elif backfill:
              target_dates = [backfill]
              print(f"Backfill mode: date {backfill}")
          else:
              target_dates = [today]
              print(f"Normal mode: posts dated {today}")

          # Credentials
          li_token = os.environ.get("LINKEDIN_ACCESS_TOKEN", "")
          li_urn = os.environ.get("LINKEDIN_PERSON_URN", "")
          bsky_handle = os.environ.get("BLUESKY_HANDLE", "")
          bsky_pass = os.environ.get("BLUESKY_APP_PASSWORD", "")

          do_linkedin = platform in ("both", "linkedin") and li_token and li_urn
          do_bluesky = platform in ("both", "bluesky") and bsky_handle and bsky_pass

          if not do_linkedin and not do_bluesky:
              print("No platforms configured or selected")
              sys.exit(0)

          # Find matching posts
          posts_to_syndicate = []
          for post_path in sorted(glob.glob("docs/blog/posts/*.md")):
              with open(post_path) as f:
                  content = f.read()
              if not content.startswith("---"):
                  continue
              parts = content.split("---", 2)
              if len(parts) < 3:
                  continue
              try:
                  fm = yaml.safe_load(parts[1])
              except yaml.YAMLError:
                  continue
              post_date = fm.get("date", "")
              if hasattr(post_date, "strftime"):
                  post_date = post_date.strftime("%Y-%m-%d")
              else:
                  post_date = str(post_date)
              if target_dates is None:
                  if post_date <= today:
                      posts_to_syndicate.append((post_path, fm, parts[2]))
              elif post_date in target_dates:
                  posts_to_syndicate.append((post_path, fm, parts[2]))

          if not posts_to_syndicate:
              print("No posts to syndicate")
              sys.exit(0)

          print(f"Found {len(posts_to_syndicate)} post(s)")

          # Load syndication state
          state_file = ".github/.syndicated"
          syndicated = set()
          if os.path.exists(state_file):
              syndicated = set(line.strip() for line in open(state_file) if line.strip())

          def get_post_meta(post_path, fm, body):
              """Extract slug, title, and URL from a post."""
              filename = os.path.basename(post_path).replace(".md", "")
              if re.match(r"\d{4}-\d{2}-\d{2}-", filename):
                  slug = filename[11:]
              else:
                  slug = filename
              title_match = re.search(r"^#\s+(.+)$", body, re.MULTILINE)
              title = title_match.group(1).strip() if title_match else slug.replace("-", " ").title()
              title = re.sub(r"[`*_]", "", title)
              post_date = fm.get("date", "")
              if hasattr(post_date, "strftime"):
                  year, month, day = post_date.strftime("%Y"), post_date.strftime("%m"), post_date.strftime("%d")
              else:
                  year, month, day = str(post_date).split("-")
              url = f"https://johnazariah.github.io/quantum/blog/{year}/{month}/{day}/{slug}/"
              return slug, title, url

          # --- LinkedIn ---
          if do_linkedin:
              print("\n--- LinkedIn ---")
              for post_path, fm, body in posts_to_syndicate:
                  social = fm.get("social", {}) or {}
                  hook = social.get("linkedin", "").strip()
                  if not hook:
                      continue
                  slug, title, url = get_post_meta(post_path, fm, body)
                  key = f"li:{slug}"
                  if key in syndicated:
                      print(f"⏭️  Already posted: {slug}")
                      continue

                  payload = {
                      "author": li_urn,
                      "commentary": hook,
                      "visibility": "PUBLIC",
                      "distribution": {
                          "feedDistribution": "MAIN_FEED",
                          "targetEntities": [],
                          "thirdPartyDistributionChannels": []
                      },
                      "content": {
                          "article": {
                              "source": url,
                              "title": title
                          }
                      },
                      "lifecycleState": "PUBLISHED",
                      "isReshareDisabledByAuthor": False
                  }
                  data = json.dumps(payload).encode()
                  req = urllib.request.Request(
                      "https://api.linkedin.com/rest/posts",
                      data=data,
                      headers={
                          "Authorization": f"Bearer {li_token}",
                          "Content-Type": "application/json",
                          "LinkedIn-Version": "202601",
                          "X-Restli-Protocol-Version": "2.0.0",
                      },
                      method="POST"
                  )
                  try:
                      urllib.request.urlopen(req)
                      print(f"✅ {title}")
                      syndicated.add(key)
                  except urllib.error.HTTPError as e:
                      print(f"❌ {slug}: {e.code} {e.read().decode()}")

          # --- Bluesky ---
          if do_bluesky:
              print("\n--- Bluesky ---")
              # Authenticate
              auth_data = json.dumps({
                  "identifier": bsky_handle,
                  "password": bsky_pass
              }).encode()
              auth_req = urllib.request.Request(
                  "https://bsky.social/xrpc/com.atproto.server.createSession",
                  data=auth_data,
                  headers={"Content-Type": "application/json"},
                  method="POST"
              )
              try:
                  auth_resp = urllib.request.urlopen(auth_req)
                  session = json.loads(auth_resp.read())
                  bsky_token = session["accessJwt"]
                  bsky_did = session["did"]
              except urllib.error.HTTPError as e:
                  print(f"❌ Auth failed: {e.code} {e.read().decode()}")
                  bsky_token = None

              # Load thread state (series → root/latest post refs)
              threads_file = ".github/.bsky-threads.json"
              threads = {}
              if os.path.exists(threads_file):
                  threads = json.loads(open(threads_file).read())

              if bsky_token:
                  for post_path, fm, body in posts_to_syndicate:
                      social = fm.get("social", {}) or {}
                      hook = social.get("bluesky", "").strip()
                      if not hook:
                          continue
                      slug, title, url = get_post_meta(post_path, fm, body)
                      key = f"bs:{slug}"
                      if key in syndicated:
                          print(f"⏭️  Already posted: {slug}")
                          continue

                      full_text = f"{hook}\n\n{url}"
                      url_start = len(full_text.encode("utf-8")) - len(url.encode("utf-8"))
                      url_end = len(full_text.encode("utf-8"))
                      now_iso = datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%S.000Z")

                      record = {
                          "$type": "app.bsky.feed.post",
                          "text": full_text,
                          "createdAt": now_iso,
                          "facets": [{
                              "index": {"byteStart": url_start, "byteEnd": url_end},
                              "features": [{
                                  "$type": "app.bsky.richtext.facet#link",
                                  "uri": url
                              }]
                          }],
                          "embed": {
                              "$type": "app.bsky.embed.external",
                              "external": {
                                  "uri": url,
                                  "title": title,
                                  "description": hook[:200]
                              }
                          }
                      }

                      # Thread support: if post belongs to a series, reply to previous
                      categories = fm.get("categories", [])
                      series_name = categories[0] if categories else None
                      if series_name and series_name in threads:
                          thread = threads[series_name]
                          record["reply"] = {
                              "root": {"uri": thread["root"]["uri"], "cid": thread["root"]["cid"]},
                              "parent": {"uri": thread["latest"]["uri"], "cid": thread["latest"]["cid"]}
                          }
                          print(f"  ↳ Threading under: {series_name}")

                      bsky_payload = json.dumps({
                          "repo": bsky_did,
                          "collection": "app.bsky.feed.post",
                          "record": record
                      }).encode()
                      req = urllib.request.Request(
                          "https://bsky.social/xrpc/com.atproto.repo.createRecord",
                          data=bsky_payload,
                          headers={
                              "Content-Type": "application/json",
                              "Authorization": f"Bearer {bsky_token}",
                          },
                          method="POST"
                      )
                      try:
                          resp = urllib.request.urlopen(req)
                          result = json.loads(resp.read())
                          post_uri = result.get("uri", "")
                          post_cid = result.get("cid", "")
                          print(f"✅ {slug}")
                          syndicated.add(key)

                          # Update thread state
                          if series_name:
                              if series_name not in threads:
                                  # First post in series = root
                                  threads[series_name] = {
                                      "root": {"uri": post_uri, "cid": post_cid},
                                      "latest": {"uri": post_uri, "cid": post_cid}
                                  }
                                  print(f"  📌 Thread root for: {series_name}")
                              else:
                                  threads[series_name]["latest"] = {"uri": post_uri, "cid": post_cid}
                      except urllib.error.HTTPError as e:
                          print(f"❌ {slug}: {e.code} {e.read().decode()}")

              # Save thread state
              os.makedirs(os.path.dirname(threads_file), exist_ok=True)
              with open(threads_file, "w") as f:
                  json.dump(threads, f, indent=2)
          else:
              if not bsky_handle or not bsky_pass:
                  print("\n⚠️  Bluesky credentials not configured, skipping")

          # Save state
          os.makedirs(os.path.dirname(state_file), exist_ok=True)
          with open(state_file, "w") as f:
              f.write("\n".join(sorted(s for s in syndicated if s)) + "\n")
          SCRIPT

      - name: Commit syndication state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/.syndicated .github/.bsky-threads.json 2>/dev/null || true
          git diff --cached --quiet || (git commit -m "chore: update syndication state [skip ci]" && git push)
