name: Social Syndication

on:
  workflow_run:
    workflows: ["Deploy to GitHub Pages"]
    types: [completed]
    branches: [main]
  workflow_dispatch: # manual trigger for testing

jobs:
  linkedin:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Find posts going live today
        id: find
        run: |
          today=$(date -u +%Y-%m-%d)
          echo "today=$today"
          posts=$(find docs/blog/posts -name "${today}-*.md" -type f 2>/dev/null || true)
          if [ -z "$posts" ]; then
            echo "No posts for today ($today)"
            echo "found=false" >> "$GITHUB_OUTPUT"
          else
            echo "Found posts for $today:"
            echo "$posts"
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "posts<<EOF" >> "$GITHUB_OUTPUT"
            echo "$posts" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          fi

      - name: Check syndication cache
        if: steps.find.outputs.found == 'true'
        id: cache
        uses: actions/cache@v4
        with:
          path: .syndicated
          key: syndicated-${{ steps.find.outputs.today || 'none' }}
          restore-keys: syndicated-

      - name: Post to LinkedIn
        if: steps.find.outputs.found == 'true'
        env:
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_URN: ${{ secrets.LINKEDIN_PERSON_URN }}
          POSTS: ${{ steps.find.outputs.posts }}
        run: |
          pip install pyyaml -q
          python3 << 'SCRIPT'
          import yaml, json, os, urllib.request, re, sys

          posts_raw = os.environ.get("POSTS", "").strip()
          if not posts_raw:
              print("No posts to syndicate")
              sys.exit(0)

          posts = [p for p in posts_raw.split("\n") if p.strip()]
          token = os.environ["LINKEDIN_ACCESS_TOKEN"]
          person_urn = os.environ["LINKEDIN_PERSON_URN"]

          # Load already-syndicated slugs
          syndicated_file = ".syndicated"
          syndicated = set()
          if os.path.exists(syndicated_file):
              syndicated = set(open(syndicated_file).read().strip().split("\n"))

          for post_path in posts:
              # Derive slug from filename
              filename = os.path.basename(post_path)
              date_part = filename[:10]
              slug = filename[11:].replace(".md", "")

              if slug in syndicated:
                  print(f"⏭️  Already syndicated: {slug}")
                  continue

              # Read file
              with open(post_path) as f:
                  content = f.read()

              # Parse YAML front matter
              if not content.startswith("---"):
                  print(f"⚠️  No front matter in {post_path}, skipping")
                  continue
              parts = content.split("---", 2)
              if len(parts) < 3:
                  continue
              fm = yaml.safe_load(parts[1])
              body = parts[2]

              # Get LinkedIn hook from front matter
              social = fm.get("social", {}) or {}
              linkedin_hook = social.get("linkedin", "").strip()
              if not linkedin_hook:
                  print(f"⚠️  No social.linkedin in {post_path}, skipping")
                  continue

              # Extract title from first H1
              title_match = re.search(r"^#\s+(.+)$", body, re.MULTILINE)
              title = title_match.group(1).strip() if title_match else slug.replace("-", " ").title()
              # Clean markdown from title
              title = re.sub(r'[`*_]', '', title)

              # Build URL
              year, month, day = date_part.split("-")
              url = f"https://johnazariah.github.io/quantum/blog/{year}/{month}/{day}/{slug}/"

              # Build LinkedIn post payload
              payload = {
                  "author": person_urn,
                  "commentary": linkedin_hook,
                  "visibility": "PUBLIC",
                  "distribution": {
                      "feedDistribution": "MAIN_FEED",
                      "targetEntities": [],
                      "thirdPartyDistributionChannels": []
                  },
                  "content": {
                      "article": {
                          "source": url,
                          "title": title
                      }
                  },
                  "lifecycleState": "PUBLISHED",
                  "isReshareDisabledByAuthor": False
              }

              data = json.dumps(payload).encode()
              req = urllib.request.Request(
                  "https://api.linkedin.com/rest/posts",
                  data=data,
                  headers={
                      "Authorization": f"Bearer {token}",
                      "Content-Type": "application/json",
                      "LinkedIn-Version": "202601",
                      "X-Restli-Protocol-Version": "2.0.0",
                  },
                  method="POST"
              )
              try:
                  resp = urllib.request.urlopen(req)
                  print(f"✅ LinkedIn posted: {title}")
                  print(f"   URL: {url}")
                  syndicated.add(slug)
              except urllib.error.HTTPError as e:
                  body_err = e.read().decode()
                  print(f"❌ LinkedIn failed for {slug}: {e.code}")
                  print(f"   {body_err}")
                  sys.exit(1)

          # Save syndication state
          with open(syndicated_file, "w") as f:
              f.write("\n".join(sorted(syndicated)))
          SCRIPT

      - name: Post to Bluesky
        if: steps.find.outputs.found == 'true' && secrets.BLUESKY_APP_PASSWORD != ''
        env:
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
          POSTS: ${{ steps.find.outputs.posts }}
        run: |
          echo "Bluesky syndication not yet configured — skipping"
          # TODO: implement when credentials are available
